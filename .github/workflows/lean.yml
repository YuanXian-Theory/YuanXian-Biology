name: Lean 4 Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake
        uses: actions/cache@v4
        with:
          path: |
            .lake
            build
          key: ${{ runner.os }}-lean-${{ hashFiles('lake.toml', 'lean-toolchain') }}

      - name: Get dependencies
        run: lake exe cache get

      - name: Build & Verify All Axioms and Theorems
        run: lake build

      - name: Check Main Results
        run: lake exe cache get && lean --run YuanXianBiology.lean
